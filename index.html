<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOLD — Laundry Pickup & Delivery | Montgomery, AL</title>
  <meta
    name="description"
    content="Premium laundry pickup and delivery in Montgomery, AL. Weighed by the bag with transparent SMS tracking and receipt-before-charge billing."
  />
  <meta name="theme-color" content="#059669" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#059669',
            accent: '#F7D6DE'
          },
          boxShadow: {
            premium: '0 24px 60px -30px rgba(15, 23, 42, 0.55)'
          },
          borderRadius: {
            premium: '1.5rem'
          }
        }
      }
    };
  </script>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 12% 10%, rgba(247, 214, 222, 0.4), transparent 42%),
                  radial-gradient(circle at 88% 20%, rgba(247, 214, 222, 0.24), transparent 36%),
                  #f8fafc;
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      will-change: opacity, transform;
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hover-lift {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .hover-lift:hover,
    .hover-lift:focus-visible {
      transform: translateY(-6px);
      box-shadow: 0 22px 40px -24px rgba(15, 23, 42, 0.45);
    }
  </style>
</head>
<body class="min-h-screen text-slate-800 antialiased">

    Skip to main content
  </a>

  <main id="main-content" class="mx-auto w-full max-w-7xl px-4 py-8 sm:px-6 lg:px-8">

  </main>
</body>
</html>
